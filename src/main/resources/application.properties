spring.application.name=Auth

# PostgreSQL 연결 정보입니다. Docker Compose에서는 postgres 서비스 이름을 DB_HOST로 사용합니다.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_db}
spring.datasource.username=${DB_USERNAME:auth_user}
spring.datasource.password=${DB_PASSWORD:auth_password}
spring.datasource.driver-class-name=org.postgresql.Driver

# 개발 초기에는 update가 편하고, 운영에서는 validate 또는 none으로 바꾸는 것을 권장합니다.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Refresh Token 저장과 로그아웃 처리를 위한 Redis 연결 정보입니다.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# JWT 서명에 사용할 비밀키입니다. 운영 환경에서는 환경 변수로 충분히 긴 값을 주입해주세요.
jwt.secret=${JWT_SECRET:change-this-secret-key-for-local-development-only}
jwt.access-token-expiration=30m
jwt.refresh-token-expiration=14d

# Auth 서버가 로그인 검증을 위임할 User 서비스 주소입니다.
user-service.base-url=${USER_SERVICE_BASE_URL:http://localhost:8081}
