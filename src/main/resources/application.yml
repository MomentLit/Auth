spring:
  application:
    name: Auth

  # PostgreSQL 연결 정보입니다. Docker Compose에서는 postgres 서비스 이름을 DB_HOST로 사용합니다.
  datasource:
    url: "jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:momentlit}?currentSchema=${DB_SCHEMA:auth}"
    username: "${DB_USERNAME:momentlit}"
    password: "${DB_PASSWORD:momentlit1234@}"
    driver-class-name: org.postgresql.Driver

  # 개발 초기에는 update가 편하고, 운영에서는 validate 또는 none으로 바꾸는 것을 권장합니다.
  jpa:
    hibernate:
      ddl-auto: "${JPA_DDL_AUTO:update}"
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Refresh Token 저장과 로그아웃 처리를 위한 Redis 연결 정보입니다.
  data:
    redis:
      cluster:
        nodes:
          - "${REDIS_HOST:localhost}:${REDIS_PORT:6379}"
      ssl:
        enabled: ${REDIS_SSL_ENABLED:true}

# JWT 서명에 사용할 비밀키입니다. 운영 환경에서는 환경 변수로 충분히 긴 값을 주입해주세요.
jwt:
  secret: "${JWT_SECRET:change-this-secret-key-for-local-development-only}"
  access-token-expiration: 30m
  refresh-token-expiration: 14d

# Auth 서버가 로그인 검증을 위임할 User 서비스 주소입니다.
user-service:
  base-url: "${USER_SERVICE_BASE_URL:http://localhost:8081}"

# Google OAuth 로그인 설정입니다.
oauth:
  google:
    client-id: "${GOOGLE_CLIENT_ID:}"
    client-secret: "${GOOGLE_CLIENT_SECRET:}"
    redirect-uri: "${GOOGLE_REDIRECT_URI:http://localhost:8080/auth/oauth/google/callback}"
    authorization-uri: "https://accounts.google.com/o/oauth2/v2/auth"
    token-uri: "https://oauth2.googleapis.com/token"
    user-info-uri: "https://www.googleapis.com/oauth2/v3/userinfo"
    scope: "openid email profile"
