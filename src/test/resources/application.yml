spring:
  datasource:
    url: "jdbc:h2:mem:auth-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop

  autoconfigure:
    exclude: org.springframework.boot.data.redis.autoconfigure.RedisAutoConfiguration

oauth:
  google:
    client-id: test-google-client-id
    client-secret: test-google-client-secret
    redirect-uri: "http://localhost:8080/auth/oauth/google/callback"
    authorization-uri: "https://accounts.google.com/o/oauth2/v2/auth"
    token-uri: "https://oauth2.googleapis.com/token"
    user-info-uri: "https://www.googleapis.com/oauth2/v3/userinfo"
    scope: "openid email profile"
