spring:
  datasource:
    url: "jdbc:h2:mem:auth-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop

  autoconfigure:
    exclude: org.springframework.boot.data.redis.autoconfigure.RedisAutoConfiguration
